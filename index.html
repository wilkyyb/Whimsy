<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oikku</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="left-container">
            <div class="gif">
                <img src="assets/breakingbad.gif" width="360px" alt="Ganyu GIF" />
            </div>
        </div>

        <div class="right-container">
            <div class="head">
                <p id="greeting">home</p>
            </div>

            <p id="clock"></p>

            <div class="search-container">
                <input 
                    type="text" 
                    class="search-bar" 
                    id="searchInput" 
                    placeholder="🔎   Missä lähin kebabbila?"
                >
                <div class="search-engines">
                    <button class="search-engine active" data-engine="google">
                    <i class="fa-solid fa-magnifying-glass"></i> DuckDuckGo
                    </button>
                    <button class="search-engine" data-engine="google">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="search-engine" data-engine="youtube">
                        <i class="fa-brands fa-youtube"></i> YouTube
                    </button>
                </div>
            </div>

            <div class="bookmarks">
                <div class="category">
                    <div class="links">
                        <li class="title">Daily</li>
                        <li><a href="https://youtube.com/">YouTube</a></li>
                        <li><a href="https://twitch.tv/">Twitch</a></li>
                        <li><a href="https://mail.google.com/mail/u/0/#inbox">Gmail</a></li>
                        <li><a href="https://www.hs.fi/">HS</a></li>
                    </div>
                </div>

                <div class="category">
                    <div class="links">
                        <li class="title">Utils</li>
                        <li><a href="https://e-z.gg/dash/gallery">E-Z Gallery</a></li>
                        <li><a href="https://fmhy.net">fhmy</a></li>
                        <li><a href="https://steamdb.info">SteamDB</a></li>
                    </div>
                </div>

                <div class="category">
                    <div class="links">
                        <li class="title">Movies</li>
                        <li><a href="https://aether.mom/">Aether</a></li>
                        <li><a href="https://nepu.to">Nepu</a></li>
                        <li><a href="https://www.cineby.gd/">Cineby</a></li>
                    </div>
                </div>

                <div class="category">
                    <div class="links">
                        <li class="title">Practice</li>
                        <li><a href="https://leetcode.com/">LeetCode</a></li>
                        <li><a href="https://www.hackerone.com/">HackerOne</a></li>
                    </div>
                </div>

                <div class="category">
                    <div class="links">
                        <li class="title">Minecraft</li>
                        <li><a href="https://namemc.com/profile/hullu.5">NameMC</a></li>
                        <li><a href="https://modrinth.com/">Modrinth</a></li>
                        <li><a href="https://minecraft.wiki/">Wiki</a></li>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/greet.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
